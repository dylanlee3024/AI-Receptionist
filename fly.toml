app = "cph"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Deepgram STT
  DEEPGRAM_MODEL                      = "nova-3"
  DEEPGRAM_ENDPOINTING_MS             = "100"

  # OpenAI LLM
  OPENAI_MODEL                        = "gpt-4o-mini"
  OPENAI_TEMPERATURE                  = "0.2"
  OPENAI_MAX_TOKENS                   = "90"
  OPENAI_HANDOFF_MODEL                = "gpt-4o-mini"

  # ElevenLabs TTS voice settings
  ELEVENLABS_VOICE_ID                 = "56AoDkrOh6qfVPDXZ7Pt"
  ELEVENLABS_SPEED                    = "0.95"
  ELEVENLABS_STABILITY                = "0.50"
  ELEVENLABS_SIMILARITY_BOOST         = "0.75"
  ELEVENLABS_STYLE                    = "0.0"
  ELEVENLABS_USE_SPEAKER_BOOST        = "false"
  ELEVENLABS_APPLY_TEXT_NORMALIZATION = "auto"

  # Audio output
  AUDIO_OUT_SAMPLE_RATE               = "16000"
  AUDIO_OUT_10MS_CHUNKS               = "2"

  # Lead handoff
  LEAD_EMAIL_FROM                     = "Campbell's Receptionist <hello@hyalitedigital.com>"
  LEAD_EMAIL_TO                       = "dylanlee3024@gmail.com"
  FOLLOWUP_SMS_ENABLED                = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 10
    hard_limit = 15

[[vm]]
  size = "performance-1x"
  memory = "2gb"
